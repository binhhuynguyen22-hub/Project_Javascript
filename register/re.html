<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./re.css" />

  </head>
  <body>
    <form action="" class="form-re" id="form">
      <div class="table">
        <h2 class="title">Đăng ký tài khoản</h2>

        <label>Họ và tên</label><br />
        <input type="text" class="name" id="name" /><br/>
        <small class="validate" id="valid-name" style="color: red;"></small><br/>

        <label>Email</label><br />
        <input type="email" class="email" id="email" /><br />
        <small class="validate" id="valid-email" style="color: red;"></small><br/>

        <label>Mật khẩu</label><br />
        <input type="password" class="pass" id="pass" /><br/>
        <small class="validate" id="valid-pass" style="color: red;"></small><br/>

        <label>Xác nhận mật khẩu</label><br />
        <input type="password" class="repass" id="repass" /><br>
        <small class="validate" id="valid-repass" style="color: red;"></small><br/>

        <button class="btn-submit" id="btn-submit">Đăng ký</button>

        <div class="dep">
          Đã có tài khoản ?
          <span><a href="../login/login.html">Đăng nhập ngay</a></span>
        </div>
      </div>
    </form>

    <script src="./re.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
