<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>

<form action="" class="form-lo" id="form">
<div class="table">
    <h2 class="title">Đăng nhập</h2>

    <label>Email</label><br>
    <input type="email" class="email" id="email"><br>
    <small class="validate" id="valid-email" style="color: red;"></small><br>

    <label>Mật khẩu</label><br>
    <input type="password" class="pass" id="pass"><br>
    <small class="validate" id="valid-pass" style="color: red;"></small><br>

    <button class="btn" id="btn-submit">Đăng nhập</button>

    <div class="dep">
        Chưa có tài khoản?<span><a href="../register/re.html">Đăng kí ngay</a></span>
    </div>
</div>
</form>

<script src="./login.js"></script>
</body>
</html>
